server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 64M;

    return 301 https://growica.local$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name growica.local localhost;
    server_name_in_redirect off;

    ssl_certificate     /etc/nginx/certs/growica.local.crt;
    ssl_certificate_key /etc/nginx/certs/growica.local.key;

    client_max_body_size 64M;

    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SERVER_NAME growica.local;
        fastcgi_param HTTP_HOST growica.local;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|ttf|woff|woff2)$ {
        try_files $uri =404;
        expires 1d;
        access_log off;
    }
}